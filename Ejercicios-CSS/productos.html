<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        .card h3 {
            font-size: 1em;
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>

<h1>Nuestros Productos</h1>

<div class="grid-container">
    <div class="card">
        <img src="../Ejercicios-JavaScript/images/dobok.webp" alt="Dobok">
        <h3>Dobok</h3>
    </div>
    <div class="card">
        <img src="../Ejercicios-JavaScript/images/protectores-manos.webp" alt="Protectores de manos">
        <h3>Protectores de Manos</h3>
    </div>
    <div class="card">
        <img src="../Ejercicios-JavaScript/images/protectores-pie.webp" alt="Protectores de pie">
        <h3>Protectores de Pie</h3>
    </div>
    <div class="card">
        <img src="../Ejercicios-JavaScript/images/cabezal-cerrado.webp" alt="Cabezal cerrado">
        <h3>Cabezal Cerrado</h3>
    </div>
    <div class="card">
        <img src="../Ejercicios-JavaScript/images/escudo-potencia.webp" alt="Escudo de potencia">
        <h3>Escudo de Potencia</h3>
    </div>
    <div class="card">
        <img src="../Ejercicios-JavaScript/images/foco-con-dedos.webp" alt="Foco con dedos">
        <h3>Foco con Dedos</h3>
    </div>
</div>

</body>
</html>
