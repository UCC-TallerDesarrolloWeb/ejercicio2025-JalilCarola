<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        nav {
            text-align: center;
            padding: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        .card h3 {
            font-size: 1em;
            margin: 10px 0 0 0;
        }

        #vacio {
            text-align: center;
            font-style: italic;
            color: #777;
        }
    </style>
</head>
<body onload="renderCarrito()">

<nav>
    <a href="productos.html">Volver al Catálogo</a>
</nav>

<h1>Carrito de Compras</h1>

<div id="contenedorCarrito" class="grid-container"></div>

<script>
    /**
     * Lee el carrito guardado en LocalStorage y genera una tarjeta por cada
     * producto agregado, dentro de #contenedorCarrito.
     * @method renderCarrito
     * @return {void} no retorna nada, actualiza el DOM directamente
     */
    const renderCarrito = () => {
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        const contenedor = document.getElementById("contenedorCarrito");

        if (carrito.length === 0) {
            contenedor.innerHTML = "<p id='vacio'>Tu carrito está vacío.</p>";
            return;
        }

        let html = "";
        carrito.forEach((producto) => {
            html += `
                <div class="card">
                    <img src="../Ejercicios-JavaScript/images/${producto.imagen}" alt="${producto.nombre}">
                    <h3>${producto.nombre}</h3>
                    <p>$${producto.precio}</p>
                </div>
            `;
        });
        contenedor.innerHTML = html;
    };
</script>
</body>
</html>
