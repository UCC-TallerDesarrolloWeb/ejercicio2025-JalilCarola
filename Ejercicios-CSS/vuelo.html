<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selector de Vuelos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 border rounded-4 p-4 bg-white">

            <h5 class="fw-bold text-center mb-3">Buscar Vuelos</h5>

            <div class="d-flex justify-content-center align-items-center gap-2 flex-wrap">

                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
                        Origen: Córdoba
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Córdoba</a></li>
                        <li><a class="dropdown-item" href="#">Buenos Aires</a></li>
                        <li><a class="dropdown-item" href="#">Mendoza</a></li>
                    </ul>
                </div>

                <span class="text-secondary">→</span>

                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
                        Destino: Bariloche
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Bariloche</a></li>
                        <li><a class="dropdown-item" href="#">Salta</a></li>
                        <li><a class="dropdown-item" href="#">Iguazú</a></li>
                    </ul>
                </div>

                <div class="border-start ps-2">
                    <button class="btn btn-primary px-4">Buscar</button>
                </div>
            </div>

            <div class="row mt-4 py-3 border-top">
                <div class="col-4 text-center">
                    <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center mx-auto" style="width:40px; height:40px;">✈</div>
                    <p class="mt-2 mb-0 fw-bold">Ida y vuelta</p>
                </div>
                <div class="col-4 text-center">
                    <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center mx-auto" style="width:40px; height:40px;">1</div>
                    <p class="mt-2 mb-0 fw-bold">1 pasajero</p>
                </div>
                <div class="col-4 text-center">
                    <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center mx-auto" style="width:40px; height:40px;">$</div>
                    <p class="mt-2 mb-0 fw-bold">Económica</p>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
