<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Instagram</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>

    <style>
        /* Variables CSS reutilizables para los colores de los botones */
        :root {
            --color-primario: #405de6;
            --color-secundario: #c13584;
            --color-texto: white;
        }

        nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 20px;
        }

        nav button {
            border: none;
            border-radius: 6px;
            color: var(--color-texto);
            background-color: var(--color-primario);
            padding: 10px 18px;
            transition: background-color 0.4s ease, padding 0.4s ease;
        }

        nav button:hover {
            background-color: var(--color-secundario);
            padding: 10px 28px;
        }

        .photo-grid img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

<nav>
    <button type="button">Catálogo</button>
    <button type="button">Carrito de Compras</button>
</nav>

<!-- Grid con Bootstrap: 3 columnas desde pantallas >=576px (col-sm-4), 1 columna en pantallas chicas (col-12) -->
<div class="container photo-grid">
    <div class="row">
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_01.png" alt="Foto 1 del feed">
        </div>
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_02.png" alt="Foto 2 del feed">
        </div>
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_03.png" alt="Foto 3 del feed">
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_04.png" alt="Foto 4 del feed">
        </div>
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_05.png" alt="Foto 5 del feed">
        </div>
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_06.png" alt="Foto 6 del feed">
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_07.png" alt="Foto 7 del feed">
        </div>
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_08.png" alt="Foto 8 del feed">
        </div>
        <div class="col-12 col-sm-4">
            <img src="imagenes/satoshito89_09.png" alt="Foto 9 del feed">
        </div>
    </div>
</div>
</body>
</html>
