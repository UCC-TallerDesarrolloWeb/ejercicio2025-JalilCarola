<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio Backgrounds</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            color: white;
            text-shadow: 1px 1px 3px black;

            background-color: #2c3e50;
            background-image: url("imagenes/fondo_mario.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            background-origin: border-box;
            background-clip: border-box;
        }

        h1 {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
<h1>Ejercicio de Backgrounds</h1>
<p style="text-align: center;">Esta página usa fondo_mario.jpg como fondo, con background-size: cover (ocupa toda la pantalla) y background-attachment: fixed (no se mueve al scrollear).</p>
</body>
</html>
