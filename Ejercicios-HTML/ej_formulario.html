<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio Formulario</title>
    <style>
        form {
            display: block;
            margin-top: 0em;
        }
    </style>
</head>
<body>

<form>
<fieldset>
<legend>Suscríbase a Nuestro Portal de Noticias! Crear una cuenta es rápido!</legend>

<p>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" size="40" maxlength="40" placeholder="Ingrese su nombre">
</p>

<p>
    <label for="apellido">Apellido:</label>
    <input type="text" id="apellido" name="apellido" size="40" maxlength="40" placeholder="Ingrese su apellido">
</p>

<p>
    Sexo:
    <label for="masculino">Masculino</label>
    <input type="radio" id="masculino" name="sexo" value="masculino">
    <label for="femenino">Femenino</label>
    <input type="radio" id="femenino" name="sexo" value="femenino">
</p>

<p>
    <label for="edad">Edad:</label>
    <input type="number" id="edad" name="edad" maxlength="3" min="0" max="120" placeholder="Ingrese su edad">
</p>

<p>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" size="40" placeholder="ejemplo@correo.com">
</p>

<p>
    <label for="usuario">Usuario:</label>
    <input type="text" id="usuario" name="usuario" size="40" maxlength="20" placeholder="Elija un usuario">
</p>

<p>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" size="40" placeholder="Ingrese contraseña">
</p>

<p>
    <label for="confirmar">Confirmar Password:</label>
    <input type="password" id="confirmar" name="confirmar" size="40" placeholder="Repita la contraseña">
</p>

<p>
    <label for="servicio">Tipo de servicio:</label>
    <select id="servicio" name="servicio">
        <option value="free">Free</option>
        <option value="standard">Standard</option>
        <option value="premium">Premium</option>
    </select>
</p>

<p>
    Tema:
    <label for="tema-politica">Política</label>
    <input type="checkbox" id="tema-politica" name="tema" value="politica">
    <label for="tema-negocios">Negocios</label>
    <input type="checkbox" id="tema-negocios" name="tema" value="negocios">
    <label for="tema-tecnologia">Tecnología</label>
    <input type="checkbox" id="tema-tecnologia" name="tema" value="tecnologia">
    <label for="tema-salud">Salud</label>
    <input type="checkbox" id="tema-salud" name="tema" value="salud">
</p>

<p>
    <label for="comentario">Agregue un comentario:</label><br>
    <textarea id="comentario" name="comentario" rows="5" cols="50" placeholder="Escriba su comentario aquí"></textarea>
</p>

<p>
    <input type="submit" value="Enviar">
</p>

</fieldset>
</form>

</body>
</html>
